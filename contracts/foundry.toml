[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]
fs_permissions = [{ access = "read", path = "./examples" }]

# Monad networks. Use testnet for the hackathon (free MON from the faucet).
[rpc_endpoints]
monad_testnet = "${MONAD_TESTNET_RPC}"
monad_mainnet = "${MONAD_MAINNET_RPC}"

[etherscan]
# Monad testnet block explorer (verification optional for the hackathon).
monad_testnet = { key = "${EXPLORER_API_KEY}", url = "https://explorer.testnet.monad.xyz/api", chain = 10143 }
